<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cart.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
  <div class="head_bar">
      <div class="logo">
         <div class="logos"><img src="src\Apple_logo_black.svg"></div>
      </div>
      <div  class="menu">
        <div  onclick="window.location.href='index.html'"> Store </div>
        <div  onclick="window.location.href='mac.html'"> Mac </div>
        <div  onclick="window.location.href='ipad.html'"> iPad</div>
        <div  onclick="window.location.href='iPhone.html'">iPhone</div>
        <div  onclick="window.location.href='watch.html'">Watch</div>
        <div  onclick="window.location.href='airpods.html'">AirPods</div>
        <div>TV & Home</div>
        <div>Entertainment</div>
        <div>Accessories</div>
        <div> Support</div>
      </div>
      <div class="icon">
        <div class="sss"><img src="src\search-icon.webp" alt="search logo"></div>
        <div class="cart"  onclick="window.location.href='cart.html'">
          <img src="src\cart-6930472_1280.png" alt="cart logo">
          <span id="cart_count">0</span>
        </div>
      </div>
    
      
              
              
      

    </div>
    <div style="background-color: white; height: 1vh;"></div>

    <div class="cart_page">

        <h1>Your Cart</h1>
        <div class="cart-header">
          <button class="clear-cart-btn" onclick="clearCart()" >Clear Cart</button>
        </div>

        <div class="cart-container">
          <div id="cart" class="cart-items"></div>
          <div class="summary">
            <h2 style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">Order Summary</h2>
            <div class="summary-row">
              <span style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 600;">Sub total</span>
              <span style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: 600;" id="subtotal">₹0</span>
            </div>
            <div class="summary-row">
              <span style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 600;">Shipping</span>
              <span style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 600;" > FREE</span>
            </div>
            <div class="summary-row">
              <span style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 600;" >tax</span>
              <span style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 600;" >₹0</span>
            </div>

            <hr>
            <div class="summary-rowtotal">
              <span style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;font-weight: 600;">Total</span>
              <span style="font-weight: 600; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;" id="total" >₹0</span>
            </div>

            <button class="checkout-btn" onclick="checkout()">
              Proceed to Checkout
            </button>


          </div>
        </div>

    </div>

    <script src="script.js"></script>
<div id="thankYouModal" class="modal">

    <div class="modal-content">

        <h2>🎉 Thank You!</h2>

        <p>Thanks for shopping with Apple.</p>

        <button onclick="closeModal()">Continue Shopping</button>

    </div>

</div>
</body>
</html>
